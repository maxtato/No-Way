<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#FAF2DC">
<title>NO WAY! — des faits à peine croyables</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Grandstander:ital,wght@0,500;0,600;0,700;0,800;1,600;1,700&display=swap" rel="stylesheet">
<style>
:root{
  --papier:#FAF2DC;
  --rouge:#E03B26;
  --bleu:#5E9BD1;
  --jaune:#F2C64B;
  --moutarde:#E6A93C;
  --encre:#2A3229;
  --vert:#79A257;
  --olive:#8A9A48;
  --vert-fonce:#4E7040;
  --corail:#E8897A;
  --nuit:#2E4257;
  --petrole:#2C6E7F;
  --turquoise:#4FA8A0;
  --brique:#B5533C;
  --sable:#E7D5AC;
  --f-disp:'Grandstander',system-ui,sans-serif;
  --f-body:'Grandstander',system-ui,sans-serif;
  --disp-case:none;
  --disp-scale:.94;
  --disp-ls:-.01em;
  --disp-w:800;
  --f-hand:'Grandstander',system-ui,sans-serif;
  --hand-w:600;
  --hand-scale:.92;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--f-body);color:var(--encre);
  background:var(--papier);
  overscroll-behavior:none;-webkit-font-smoothing:antialiased;
}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
h1,h2,.anton{font-family:var(--f-disp);font-weight:var(--disp-w);text-transform:var(--disp-case);letter-spacing:var(--disp-ls)}
.hand{font-family:var(--f-hand);font-weight:var(--hand-w);font-style:italic}

.app{position:relative;height:100dvh;overflow:hidden;max-width:520px;margin:0 auto;background:var(--papier)}

/* ---------- cadre tremblé réutilisable ---------- */
svg.fr{position:absolute;overflow:visible;pointer-events:none;z-index:0}
.framed{position:relative;background:none;border:none;box-shadow:none}
.framed > *:not(svg){position:relative;z-index:1}
svg.fr{position:absolute !important}
.chip > *:not(.fr),.mini-btn > *:not(.fr),.ans .key > *:not(.fr),.fb > *:not(.fr),
.fb-head .x > *:not(.fr),.node .tag > i,.fb-one > i{position:relative;z-index:1;font-style:normal}
.timer b{position:relative;z-index:1;border-radius:99px}

/* ---------- HUD ---------- */
.hud{position:absolute;top:0;left:0;right:0;z-index:30;
  padding:calc(env(safe-area-inset-top) + 12px) 14px 14px;
  display:flex;align-items:flex-start;gap:9px;
  background:linear-gradient(var(--papier) 62%,rgba(250,242,220,0))}
.logo{font-family:var(--f-disp);font-size:calc(30px * var(--disp-scale));font-weight:var(--disp-w);color:var(--rouge);
  transform:rotate(-2.2deg);margin-right:auto;line-height:.9;filter:url(#peint-fort);letter-spacing:-.02em}
.logo em{font-family:var(--f-hand);font-weight:var(--hand-w);font-style:italic;font-style:normal;font-size:calc(12px * var(--hand-scale));color:var(--encre);
  display:block;text-shadow:none;transform:rotate(1.9deg);margin-top:-1px;letter-spacing:.03em;opacity:.85}
.chip{padding:5px 11px;font-family:var(--f-disp);font-size:15px;
  display:flex;align-items:center;gap:5px;
  transform:rotate(1.2deg);position:relative}
.chip svg:not(.fr),.mini-btn svg:not(.fr),.fb-head .x svg:not(.fr){display:block;position:relative;z-index:1;inset:auto}
.mini-btn{width:36px;height:36px;display:grid;place-items:center;font-size:15px;transform:rotate(-2deg);position:relative}
.mini-btn:active{transform:rotate(-2deg) translate(2px,2px)}

/* ---------- CARTE ---------- */
.map-scroll{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden}
.map{position:relative;width:100%;padding-bottom:140px}
.map > svg.trace{position:absolute;top:0;left:0;width:100%;overflow:visible;pointer-events:none}

.node{position:absolute;transform:translate(-50%,-50%);width:104px;
  display:flex;flex-direction:column;align-items:center;gap:4px}
.node .disc{position:relative;width:74px;height:74px;display:grid;place-items:center}
.node.boss .disc{width:92px;height:92px}
.node .disc > svg{position:absolute;inset:-8px;width:calc(100% + 16px);height:calc(100% + 16px);overflow:visible}
.node .glyph{position:relative;z-index:2;line-height:0;display:grid;place-items:center}
.lvl-num{font-family:var(--f-disp);font-weight:800;font-style:normal;font-size:31px;
  line-height:1;color:var(--papier);filter:url(#peint);
  text-shadow:1.6px 1.8px 0 rgba(42,50,41,.6)}
.node .glyph svg:not(.fr){position:relative;z-index:2;display:block;inset:auto}
.sheet-badge span svg:not(.fr){position:relative;z-index:2;display:block;inset:auto}
.node .num{position:absolute;z-index:3;right:-2px;top:-4px;font-family:var(--f-hand);font-weight:var(--hand-w);font-style:italic;
  font-size:17px;color:var(--encre);background:var(--jaune);border:1.5px solid var(--encre);
  border-radius:50%;width:23px;height:23px;display:grid;place-items:center;transform:rotate(6deg)}
.node.locked .glyph{opacity:.5}
.node.locked .num{background:var(--papier);opacity:.7}
.node .tag{font-family:var(--f-disp);font-size:11px;letter-spacing:.05em;text-transform:uppercase;padding:1px 7px;white-space:nowrap;max-width:100%;
  overflow:hidden;text-overflow:ellipsis;position:relative}
.node.locked .tag{opacity:.5}
.node .stars{display:flex;gap:1px;height:15px}
.node.current .disc{animation:bob 2.6s ease-in-out infinite}
@keyframes bob{50%{transform:translateY(-5px) rotate(-2deg)}}
.doodle{position:absolute;font-family:var(--f-hand);font-weight:var(--hand-w);font-style:italic;font-size:calc(16px * var(--hand-scale));color:var(--rouge);
  pointer-events:none;white-space:nowrap;opacity:.9}
.scene{position:absolute;pointer-events:none;z-index:0;opacity:.5;line-height:0}
.node .flag{position:absolute;z-index:4;left:-11px;top:-13px;line-height:0;transform:rotate(-7deg);
  animation:flagwave 3.2s ease-in-out infinite}
@keyframes flagwave{50%{transform:rotate(-2deg) translateY(-1px)}}

/* ---------- SHEET ---------- */
.scrim{position:absolute;inset:0;background:rgba(42,50,41,.4);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{position:absolute;left:12px;right:12px;bottom:0;z-index:50;
  padding:24px 21px calc(env(safe-area-inset-bottom) + 46px);
  transform:translateY(115%) rotate(-.4deg);transition:transform .26s cubic-bezier(.2,.9,.3,1)}
.sheet.on{transform:translateY(0) rotate(-.4deg)}
.tape{position:absolute;width:94px;height:20px;background:var(--jaune);opacity:.9;
  border-radius:42% 58% 45% 55%/60% 42% 58% 40%;pointer-events:none;filter:url(#peint)}
.sheet-head{display:flex;align-items:center;gap:14px;margin-bottom:42px}
.sheet-badge{width:58px;height:58px;position:relative;display:grid;place-items:center;flex:none}
.sheet-badge span{line-height:0;display:grid;place-items:center}
.sheet-badge > svg{position:absolute;inset:-6px;width:calc(100% + 12px);height:calc(100% + 12px);overflow:visible}
.sheet-badge span{position:relative;z-index:2}
.sheet h2{font-size:calc(20px * var(--disp-scale));line-height:1.05;margin-bottom:4px}
.sheet .sub{font-family:var(--f-hand);font-weight:var(--hand-w);font-style:italic;font-size:calc(15.5px * var(--hand-scale));color:var(--bleu)}
.cta{display:block;width:100%;text-align:center;position:relative;color:var(--papier);
  font-family:var(--f-disp);font-size:calc(19px * var(--disp-scale));text-transform:var(--disp-case);
  letter-spacing:var(--disp-ls);font-weight:var(--disp-w);
  padding:17px;transform:rotate(-.7deg)}
.cta:active{transform:rotate(-.7deg) translate(3px,3px)}
.cta.alt{color:var(--encre);transform:rotate(.8deg)}
.cta.alt:active{transform:rotate(.8deg) translate(3px,3px)}

/* ---------- ÉCRANS ---------- */
.screen{position:absolute;inset:0;z-index:60;background:var(--papier);overflow:hidden;
  display:flex;flex-direction:column;padding:calc(env(safe-area-inset-top) + 12px) 15px calc(env(safe-area-inset-bottom) + 14px);
  transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.9,.3,1);visibility:hidden}
.screen.on{transform:translateY(0);visibility:visible}

.quiz-top{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.segs{display:flex;gap:3px;flex:1;transform:rotate(-.5deg)}
.segs b{flex:1;height:12px;position:relative}
.segs b.ok{background:var(--vert)}
.segs b.ko{background:var(--rouge)}
.segs b.now{background:var(--jaune)}
.hearts{display:flex;gap:2px}
.hearts svg{width:19px;height:19px}
.timer{height:10px;margin-bottom:6px;display:none;transform:rotate(.4deg);position:relative}
.timer.on{display:block}
.timer b{display:block;height:100%;background:var(--rouge);width:100%}

.q-wrap{flex:1;display:flex;flex-direction:column;justify-content:flex-start;gap:10px;min-height:0;
  padding:12px 0 calc(212px + env(safe-area-inset-bottom))}
.q-wrap .sp{display:block;flex:1 1 0;min-height:4px}
.q-wrap .sp2{flex:1.6 1 0}
.explain .cta{padding:13px;flex:none}
.cat{align-self:flex-start;font-family:var(--f-disp);font-size:12px;letter-spacing:.09em;
  text-transform:uppercase;background:var(--rouge);color:var(--papier);padding:4px 12px;
  display:flex;align-items:center;gap:6px;
  transform:rotate(-1.6deg) translateX(4px);border:none;filter:url(#peint);
  border-radius:13px 10px 12px 11px/11px 13px 10px 12px}
.cat svg{display:block}
.q-card{position:relative;padding:28px 23px;transform:rotate(-.9deg);margin:0 4px 0 2px}
.q-card p{font-family:var(--f-disp);font-size:calc(23px * var(--disp-scale));line-height:1.22;
  text-transform:var(--disp-case);letter-spacing:var(--disp-ls);font-weight:var(--disp-w);filter:url(#peint)}
.answers{display:flex;flex-direction:column;gap:13px;padding-bottom:2px}
.ans{position:relative;text-align:left;padding:19px 20px;font-weight:700;font-size:17px;
  display:flex;align-items:center;gap:12px;transition:transform .12s cubic-bezier(.34,1.6,.5,1)}
.ans:active:not([disabled]){transform:scale(.96) rotate(-.4deg)!important}
.ans .key{flex:none;width:29px;height:29px;display:grid;place-items:center;
  font-family:var(--f-disp);font-size:14px;position:relative}
.ans.good{color:var(--papier)}
.ans.bad{color:var(--papier);animation:shake .34s}
.ans.good .key,.ans.bad .key{color:var(--encre)}
.ans.dim{opacity:.38}
.ans[disabled]{pointer-events:none}
@keyframes shake{0%,100%{transform:translateX(0) rotate(0)}25%{transform:translateX(-7px) rotate(-1.5deg)}75%{transform:translateX(7px) rotate(1.5deg)}}

.combo{position:absolute;right:15px;top:calc(env(safe-area-inset-top) + 54px);
  background:var(--rouge);color:var(--papier);font-family:var(--f-disp);font-size:15px;
  padding:4px 12px;border:2px solid var(--encre);box-shadow:3px 3px 0 var(--encre);
  transform:rotate(6deg) scale(.5);opacity:0;transition:.18s}
.combo.on{opacity:1;transform:rotate(6deg) scale(1)}

/* ---------- TAMPON « NO WAY! » — la signature ---------- */
.stamp{position:absolute;left:50%;top:40%;z-index:20;
  font-family:var(--f-disp);font-weight:800;font-size:clamp(50px,16.5vw,94px);
  color:var(--rouge);letter-spacing:-.03em;line-height:.82;text-align:center;white-space:nowrap;
  transform:translate(-50%,-50%) rotate(-9deg) scale(2.6);opacity:0;pointer-events:none;
  filter:url(#peint-fort);text-shadow:3px 5px 0 var(--encre)}
.stamp.on{animation:stamp 1.15s cubic-bezier(.2,1.35,.4,1) forwards}
.stamp.ko{color:var(--jaune)}
@keyframes stamp{
  0%{opacity:0;transform:translate(-50%,-50%) rotate(-26deg) scale(2.6)}
  15%{opacity:1;transform:translate(-50%,-50%) rotate(-9deg) scale(.9)}
  24%{transform:translate(-50%,-50%) rotate(-9deg) scale(1.05)}
  34%{transform:translate(-50%,-50%) rotate(-9deg) scale(1)}
  72%{opacity:1;transform:translate(-50%,-50%) rotate(-9deg) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) rotate(-9deg) scale(1.03)}
}
@keyframes qthump{0%,100%{transform:rotate(-.9deg)}
  22%{transform:rotate(-.9deg) translate(-4px,2px)}48%{transform:rotate(-.9deg) translate(4px,-2px)}
  70%{transform:rotate(-.9deg) translate(-2px,1px)}88%{transform:rotate(-.9deg) translate(2px,-1px)}}
.q-card.thump{animation:qthump .34s ease-in-out}

.explain{position:absolute;left:0;right:0;bottom:0;z-index:5;background:var(--papier);visibility:hidden;
  height:calc(204px + env(safe-area-inset-bottom));display:flex;flex-direction:column;
  padding:18px 16px calc(env(safe-area-inset-bottom) + 14px);
  transform:translateY(112%);transition:transform .26s cubic-bezier(.2,.9,.3,1)}
.explain.on{transform:translateY(0);visibility:visible}
.explain .vrow{display:flex;align-items:baseline;gap:9px;margin-bottom:5px;flex:none}
.explain .verdict{font-family:var(--f-disp);font-size:calc(19px * var(--disp-scale));text-transform:var(--disp-case);font-weight:var(--disp-w);transform:rotate(-.9deg)}
.explain .verdict.ok{color:var(--vert)}
.explain .verdict.ko{color:var(--rouge)}
.explain .why{font-family:var(--f-hand);font-weight:var(--hand-w);font-style:italic;font-size:calc(13px * var(--hand-scale));color:var(--bleu);
  text-transform:uppercase;letter-spacing:.08em;transform:rotate(1.2deg);opacity:.8}
.explain p{font-size:14.5px;line-height:1.45;margin-bottom:12px;flex:1;overflow-y:auto;min-height:0}

/* ---------- RÉSULTAT ---------- */
.result{align-items:center;justify-content:center;text-align:center}
.result .big-stars{display:flex;gap:6px;margin-bottom:10px}
.result .big-stars svg{width:54px;height:54px;transform:scale(0)}
.result .big-stars svg.pop{animation:pop .42s cubic-bezier(.2,1.7,.4,1) forwards}
.result .big-stars svg.flat{transform:scale(1)}
@keyframes pop{0%{transform:scale(0) rotate(-40deg)}100%{transform:scale(1) rotate(0)}}
.result h2{font-size:calc(31px * var(--disp-scale));transform:rotate(-1.2deg);margin-bottom:6px;filter:url(#peint)}
.result .score{font-family:var(--f-disp);font-size:calc(56px * var(--disp-scale));font-weight:var(--disp-w);line-height:.9;color:var(--rouge);filter:url(#peint-fort)}
.result .score small{display:block;font-family:var(--f-hand);font-weight:var(--hand-w);font-style:italic;font-size:calc(17px * var(--hand-scale));color:var(--encre);text-shadow:none;margin-top:2px}
.result .actions{width:100%;max-width:330px;display:flex;flex-direction:column;gap:11px;margin-top:26px}
.confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden}
/* confetti dans l'esprit du jeu : aplat de couleur + trait crayonné (filtre
   #peint), la couleur légèrement mal calée déborde un peu du contour */
.confetti i{position:absolute;width:12px;height:14px;top:-24px;
  background:var(--c,#E03B26);border-radius:2px 3px 2px 3px;
  animation:fall linear forwards;filter:url(#peint)}
.confetti i::after{content:'';position:absolute;inset:0;
  border:1.6px solid var(--encre);border-radius:3px 2px 3px 2px;
  transform:translate(-1.6px,-1.4px)}
@keyframes fall{to{transform:translateY(110vh) rotate(680deg)}}

/* récompense de fin de niveau : les jetons gagnés surgissent en rebond */
#resultCoins{display:inline-flex;align-items:center;gap:8px;opacity:0}
#resultCoins svg{width:23px;height:23px}
#resultCoins.on{animation:rewardPop .55s cubic-bezier(.2,1.55,.35,1) forwards}
#resultCoins.on svg{animation:coinSpin .6s ease-out}
@keyframes rewardPop{0%{opacity:0;transform:scale(.3) rotate(-14deg)}
  55%{opacity:1;transform:scale(1.14) rotate(3deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes coinSpin{0%{transform:rotateY(0)}100%{transform:rotateY(720deg)}}


.boosts{display:flex;justify-content:flex-end;align-items:center;gap:9px;flex:none;padding:0 4px 0 0;min-height:44px}
.boost{position:relative;width:42px;height:42px;display:grid;place-items:center;flex:none;transition:transform .1s}
.boost > svg{position:absolute;inset:-5px;width:52px;height:52px;overflow:visible}
.boost .g{position:relative;z-index:2;line-height:0;display:grid;place-items:center}
.boost .g svg:not(.fr){position:relative;z-index:2;display:block;width:22px;height:22px;inset:auto}
.boost .p{position:absolute;z-index:3;right:-5px;bottom:-4px;min-width:18px;height:18px;padding:0 3px;
  background:var(--encre);color:var(--jaune);border-radius:52% 48% 50% 50%/50% 52% 48% 50%;
  font-family:var(--f-body);font-size:10.5px;font-weight:700;display:grid;place-items:center}
.boost:active{transform:translateY(3px)}
.boost[disabled]{pointer-events:none}
.boost.off{opacity:.32;filter:grayscale(.8)}
.boost.used{opacity:.32}
.boost.used::after{content:'';position:absolute;left:-2px;right:-2px;top:50%;height:2.5px;background:var(--encre);transform:rotate(-14deg)}
.segs b.skip{background:repeating-linear-gradient(45deg,var(--papier) 0 3px,#CDC2A4 3px 6px)}
.jetons{display:flex;align-items:center;gap:4px}

/* écrans courts : on resserre pour garder de l'air entre la question et les réponses */
@media (max-height:815px){
  .ans{padding:13px 16px;font-size:15px}
  .answers{gap:10px}
  .q-card{padding:21px 19px}
  .boosts{min-height:40px;gap:8px}
  .boost{width:38px;height:38px}
  .boost > svg{inset:-5px;width:48px;height:48px}
  .boost .g svg{width:20px;height:20px}
  .q-wrap{padding-bottom:calc(202px + env(safe-area-inset-bottom))}
  .explain{height:calc(194px + env(safe-area-inset-bottom));padding-top:14px}
  .explain p{margin-bottom:9px}
  .explain .cta{padding:11px}
}
@media (max-height:700px){
  .ans{padding:9px 14px;font-size:14px}
  .answers{gap:7px}
  .q-card{padding:15px 17px}
  .boosts{min-height:31px;gap:6px}
  .boost{width:30px;height:30px}
  .boost > svg{inset:-4px;width:38px;height:38px}
  .boost .g svg{width:17px;height:17px}
  .boost .p{min-width:15px;height:15px;font-size:9px;right:-4px;bottom:-3px}
  .q-wrap{padding-bottom:calc(190px + env(safe-area-inset-bottom));padding-top:4px;gap:8px}
  .explain{height:calc(184px + env(safe-area-inset-bottom));padding-top:12px}
  .explain p{font-size:13.5px;line-height:1.4;margin-bottom:8px}
  .explain .verdict{font-size:calc(17px * var(--disp-scale))}
  .explain .vrow{margin-bottom:3px}
}

@media (max-height:620px){
  .ans{padding:7px 12px;font-size:13px}
  .boosts{min-height:28px;gap:5px}
  .boost{width:27px;height:27px}
  .boost > svg{inset:-3px;width:33px;height:33px}
  .boost .g svg{width:15px;height:15px}
  .boost .p{min-width:14px;height:14px;font-size:8.5px}
  .ans .key{width:23px;height:23px;font-size:12px}
  .answers{gap:7px}
  .q-card{padding:12px 15px}
  .q-card p{font-size:calc(16px * var(--disp-scale))}
  .q-wrap{padding-bottom:calc(170px + env(safe-area-inset-bottom));padding-top:4px;gap:7px}
  .explain{height:calc(162px + env(safe-area-inset-bottom));padding-top:10px}
  .explain p{font-size:13px}
  .explain .cta{padding:10px;font-size:calc(17px * var(--disp-scale))}
}

@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms !important;transition-duration:.09s !important}}
:focus-visible{outline:3px solid var(--bleu);outline-offset:3px}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <filter id="peint" x="-8%" y="-12%" width="116%" height="124%">
    <feTurbulence type="fractalNoise" baseFrequency="0.038" numOctaves="3" seed="9" result="bruit"/>
    <feDisplacementMap in="SourceGraphic" in2="bruit" scale="3.2" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <filter id="peint-fort" x="-10%" y="-14%" width="120%" height="128%">
    <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" seed="4" result="b2"/>
    <feDisplacementMap in="SourceGraphic" in2="b2" scale="5" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs></svg>
<div class="app">

  <div class="hud">
    <div class="logo">NO WAY!<em>des faits à peine croyables</em></div>
    <div class="chip" id="starCount"></div>
    <div class="chip" id="coinCount" style="transform:rotate(-1.4deg);background:var(--papier)"></div>
    <button class="mini-btn" id="soundBtn" aria-label="Couper le son"></button>
  </div>

  <div class="map-scroll" id="mapScroll"><div class="map" id="map"></div></div>

  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-head">
      <div class="sheet-badge" id="sheetBadge"><span></span></div>
      <div>

/* =========================================================
   NO WAY! — direction artistique « carnet de voyage »
   Tout ce qui est encadré est tracé à la main (SVG bruité),
   légèrement de travers, en deux encres mal calées.
   ========================================================= */

/* ---------- tracé main levée ---------- */
function rnd(s){const x=Math.sin(s*127.1+311.7)*43758.5453;return x-Math.floor(x)}
function wob(s,a){return (rnd(s)-.5)*2*a}

/** cercle griffonné, fermé et lissé */
function scribbleCircle(cx,cy,r,seed,amp=3.4,steps=17){
  const ox=1+wob(seed+1.7,.11), oy=1+wob(seed+5.3,.11);   // jamais parfaitement rond : un peu ovale
  const tilt=wob(seed+9.1,.55);                            // et jamais parfaitement droit
  const p=[];
  for(let i=0;i<steps;i++){
    const a=i/steps*Math.PI*2+tilt, rr=r+wob(seed+i*3.7,amp);
    p.push([cx+Math.cos(a)*rr*ox, cy+Math.sin(a)*rr*oy]);
  }
  let d=`M ${(p[0][0]+p[steps-1][0])/2} ${(p[0][1]+p[steps-1][1])/2}`;
  for(let i=0;i<steps;i++){
    const c=p[i], n=p[(i+1)%steps];
    d+=` Q ${c[0].toFixed(1)} ${c[1].toFixed(1)} ${((c[0]+n[0])/2).toFixed(1)} ${((c[1]+n[1])/2).toFixed(1)}`;
  }
  return d+' Z';
}
/** capsule ou pastille tracée à la main */
function scribbleRound(w,h,r,seed,amp=1.2){
  r=Math.max(2,Math.min(r,w/2,h/2));
  const pt=[]; let k=0;
  const arc=(cx,cy,a0,a1)=>{const n=5;for(let i=0;i<=n;i++){const a=a0+(a1-a0)*i/n;
    pt.push([cx+Math.cos(a)*(r+wob(seed+k*2.7,amp)), cy+Math.sin(a)*(r+wob(seed+k*3.9,amp))]); k++;}};
  const seg=(x0,y0,x1,y1)=>{const L=Math.hypot(x1-x0,y1-y0), n=Math.max(1,Math.min(5,Math.round(L/34)));
    for(let i=1;i<n;i++){const t=i/n;
      pt.push([x0+(x1-x0)*t+wob(seed+k*2.3,amp), y0+(y1-y0)*t+wob(seed+k*3.1,amp)]); k++;}};
  arc(w-r,r,-Math.PI/2,0);      seg(w,r,w,h-r);
  arc(w-r,h-r,0,Math.PI/2);     seg(w-r,h,r,h);
  arc(r,h-r,Math.PI/2,Math.PI); seg(0,h-r,0,r);
  arc(r,r,Math.PI,Math.PI*1.5); seg(r,0,w-r,0);
  let d=`M ${((pt[0][0]+pt[pt.length-1][0])/2).toFixed(1)} ${((pt[0][1]+pt[pt.length-1][1])/2).toFixed(1)}`;
  for(let i=0;i<pt.length;i++){const c=pt[i], n2=pt[(i+1)%pt.length];
    d+=` Q ${c[0].toFixed(1)} ${c[1].toFixed(1)} ${((c[0]+n2[0])/2).toFixed(1)} ${((c[1]+n2[1])/2).toFixed(1)}`;}
  return d+' Z';
}

/** rectangle griffonné : plus le côté est long, plus il ondule */
function scribbleRect(w,h,seed,amp=1.35){
  const pt=[],per=[[0,0],[w,0],[w,h],[0,h]];
  for(let s=0;s<4;s++){
    const a=per[s],b=per[(s+1)%4];
    const len=Math.hypot(b[0]-a[0],b[1]-a[1]);
    const n=Math.max(3,Math.min(6,Math.round(len/72)));
    for(let i=0;i<n;i++){
      const t=i/n;
      pt.push([a[0]+(b[0]-a[0])*t+wob(seed+s*11+i*2.3,amp), a[1]+(b[1]-a[1])*t+wob(seed+s*17+i*3.1,amp)]);
    }
  }
  let d=`M ${(pt[0][0]+pt[pt.length-1][0])/2} ${(pt[0][1]+pt[pt.length-1][1])/2}`;
  for(let i=0;i<pt.length;i++){
    const c=pt[i],nx=pt[(i+1)%pt.length];
    d+=` Q ${c[0].toFixed(1)} ${c[1].toFixed(1)} ${((c[0]+nx[0])/2).toFixed(1)} ${((c[1]+nx[1])/2).toFixed(1)}`;
  }
  return d+' Z';
}
/** étoile main levée */
function starPath(cx,cy,R,seed){
  let d='',r=R*.42;
  for(let i=0;i<10;i++){
    const a=-Math.PI/2+i*Math.PI/5+wob(seed+i*2.1,.09), rad=(i%2?r:R)+wob(seed+i,R*.13);
    const x=(cx+Math.cos(a)*rad).toFixed(1), y=(cy+Math.sin(a)*rad).toFixed(1);
    d+=(i?' L ':'M ')+x+' '+y;
  }
  return d+' Z';
}
function heartPath(){return 'M12 21s-7.5-4.7-9.5-9.2C.8 8.1 3 4.5 6.4 4.5c2 0 3.4 1.1 4.3 2.4L12 8.4l1.3-1.5c.9-1.3 2.3-2.4 4.3-2.4 3.4 0 5.6 3.6 3.9 7.3C19.5 16.3 12 21 12 21z'}

function svgEl(w,h,inner,extra=''){
  return `<svg viewBox="0 0 ${w} ${h}" ${extra} aria-hidden="true">${inner}</svg>`;
}

/** dessine le cadre d'un élément : aucune bordure CSS, tout est tracé */
const PAD=11;
function paintFrame(el,fill,shadow,seed,amp=1.35,rayon){
  if(!el) return;
  const w=el.offsetWidth, h=el.offsetHeight;
  if(!w||!h) return;
  let svg=el.querySelector(':scope > svg.fr');
  if(!svg){
    svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('class','fr'); svg.setAttribute('aria-hidden','true');
    el.insertBefore(svg,el.firstChild);
  }
  const W=w+PAD*2, H=h+PAD*2;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  Object.assign(svg.style,{left:-PAD+'px',top:-PAD+'px',width:W+'px',height:H+'px'});
  const d = rayon!==undefined ? scribbleRound(w,h,rayon===-1?h/2:rayon,seed,amp) : scribbleRect(w,h,seed,amp);
  svg.innerHTML=
    (shadow?`<path d="${d}" fill="${shadow}" opacity=".2" transform="translate(${PAD+3},${PAD+4})"/>`:'')
    +(fill?`<path d="${d}" fill="${fill}" stroke="${fill}" stroke-width="3.4" stroke-linejoin="round" transform="translate(${PAD-.6},${PAD+.5})"/>`:'')
    +`<path d="${d}" fill="none" stroke="#2A3229" stroke-width="2.2" stroke-linejoin="round" transform="translate(${PAD},${PAD})"/>`;
  svg.style.filter='url(#peint)';
  el._fr={fill,shadow,seed,amp,rayon};
  el.classList.add('framed');
}
/** petites formes d'interface : capsules et pastilles au trait */
function paintUI(el,fill,seed,ombre,ep){
  if(!el||!el.offsetWidth) return;
  paintFrame(el,fill,ombre||null,seed,1.05,-1);
  const q=el.querySelector(':scope > svg.fr path:last-of-type');
  if(q) q.setAttribute('stroke-width',ep||1.9);
}
const HEX={papier:'#FAF2DC',jaune:'#F2C64B',bleu:'#5E9BD1',rouge:'#E03B26',vert:'#79A257',encre:'#2A3229',ombre:'#2A3229',
           olive:'#8A9A48',petrole:'#2C6E7F',brique:'#B5533C',sable:'#E7D5AC'};

/** trait ondulé horizontal (bord haut du panneau d'explication) */
function paintWave(el,seed){
  if(!el) return;
  const w=el.offsetWidth; if(!w) return;
  let svg=el.querySelector(':scope > svg.wave');
  if(!svg){
    svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('class','wave'); svg.setAttribute('aria-hidden','true');
    Object.assign(svg.style,{position:'absolute',left:'0',top:'-9px',width:w+'px',height:'20px',overflow:'visible',pointerEvents:'none'});
    el.insertBefore(svg,el.firstChild);
  }
  svg.style.width=w+'px';
  svg.setAttribute('viewBox',`0 0 ${w} 20`);
  let d='M 0 10';
  const n=Math.max(6,Math.round(w/26));
  for(let i=1;i<=n;i++){
    const x=w*i/n, y=10+wob(seed+i*3.3,1.9);
    d+=` Q ${(x-w/n/2).toFixed(1)} ${(10+wob(seed+i*7.7,2.1)).toFixed(1)} ${x.toFixed(1)} ${y.toFixed(1)}`;
  }
  svg.innerHTML=`<path d="${d}" fill="none" stroke="#E7D5AC" stroke-width="6" stroke-linecap="round" transform="translate(0,2)"/>
                 <path d="${d}" fill="none" stroke="#2A3229" stroke-width="2.4" stroke-linecap="round" opacity=".9"/>`;
  svg.style.filter='url(#peint)';
}

function pictoSVG(k,size,couleur){
  const d=ICO[k]; if(!d) return '';
  return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" aria-hidden="true" style="filter:url(#peint)">

}

/* ---------- état ---------- */
let state={stars:{},unlocked:0,sound:true,seen:{},last:{},jetons:0};
const mem={};
async function save(){
  const p=JSON.stringify(state);
  try{ if(window.storage) await window.storage.set('borne:riso',p); else mem.s=p; }catch(e){ mem.s=p; }
}
async function load(){
  try{
    if(window.storage){const r=await window.storage.get('borne:riso'); if(r&&r.value) state=JSON.parse(r.value);}
    else if(mem.s) state=JSON.parse(mem.s);
  }catch(e){}
  state.seen=state.seen||{}; state.last=state.last||{};
  if(typeof state.jetons!=='number') state.jetons=0;
}

/* ---------- son ---------- */
let ac=null;
function beep(f,d,t='square',v=.055){
  if(!state.sound) return;
  try{
    ac=ac||new (window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(),g=ac.createGain();
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+d);
    o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);
  }catch(e){}
}
const sfx={
  tap:()=>beep(170,.045,'square',.045),
  good:()=>{beep(620,.07);setTimeout(()=>beep(940,.11),65)},
  bad:()=>{beep(190,.11,'sawtooth',.05);setTimeout(()=>beep(130,.17,'sawtooth',.05),85)},
  win:()=>[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,.15),i*85)),
  lose:()=>[380,300,220].forEach((f,i)=>setTimeout(()=>beep(f,.19,'sawtooth',.05),i*130))
};

/* ---------- carte ---------- */
const $=id=>document.getElementById(id);
const map=$('map'), mapScroll=$('mapScroll');
const STEP=130, AMP=25;
/* les bornes ne portent plus de thème : leur encre tourne dans la palette
   du carnet, la manche Bazar reste rouge brique */
const NODE_INKS=['petrole','turquoise','olive','moutarde','corail','vert','nuit','ocre'];
function inkOf(l,i){return l.boss?'brique':NODE_INKS[i%NODE_INKS.length]}
/* encres claires : la pastille de thème y écrit en encre foncée */
const INK_CLAIR=new Set(['moutarde','jaune','sable','ocre','corail']);

function starsRow(n,size=15,seed=0){
  return [0,1,2].map(k=>{
    const on=k<n;
    return svgEl(size,size,
      (on?`<path d="${starPath(size/2,size/2,size/2-1.2,seed+k*4+17)}" fill="#F2C64B" stroke="#F2C64B" stroke-width="2.2" stroke-linejoin="round" transform="translate(-.4,.5)"/>`:'')
      +`<path d="${starPath(size/2,size/2,size/2-1.2,seed+k*4)}" fill="none" stroke="#2A3229" stroke-width="1.4" stroke-linejoin="round" opacity="${on?1:.35}"/>`,
      `width="${size}" height="${size}" style="filter:url(#peint)"`);
  }).join('');
}

function renderMap(){
  const w=map.clientWidth||380;
  const pts=LEVELS.map((l,i)=>({x:w/2+Math.sin(i*.85)*(w*AMP/100),y:130+i*STEP}));
  const h=pts[pts.length-1].y+110;
  map.style.height=h+'px';

  // trajet tremblé, échantillonné puis lissé
  const sample=[];
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i],b=pts[i+1];
    for(let s=0;s<8;s++){
      const t=s/8, tt=t*t*(3-2*t);
      sample.push([a.x+(b.x-a.x)*tt+wob(i*31+s,2.3), a.y+(b.y-a.y)*t+wob(i*47+s,1.5)]);
    }
  }
  sample.push([pts[pts.length-1].x,pts[pts.length-1].y]);
  let d=`M ${sample[0][0].toFixed(1)} ${sample[0][1].toFixed(1)}`;
  for(let i=1;i<sample.length-1;i++){
    const c=sample[i],n=sample[i+1];
    d+=` Q ${c[0].toFixed(1)} ${c[1].toFixed(1)} ${((c[0]+n[0])/2).toFixed(1)} ${((c[1]+n[1])/2).toFixed(1)}`;
  }

  let html=`<svg class="trace" viewBox="0 0 ${w} ${h}" height="${h}" style="filter:url(#peint)">
    <path d="${d}" fill="none" stroke="#E7D5AC" stroke-width="17" stroke-linecap="round"/>
    <path d="${d}" fill="none" stroke="#4E7040" stroke-width="9" stroke-linecap="round" opacity=".92"/>
    <path d="${d}" fill="none" stroke="#FAF2DC" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 15" opacity=".9"/>
  </svg>`;

  // décor semé entre les bornes : cailloux, herbe, fossiles, empreintes, pancartes…
  for(let i=0;i<pts.length-1;i++){
    const seed=i*57+9, n=1+(rnd(seed)>.55?1:0);
    for(let j=0;j<n;j++){
      const s=SCENERY[(i*2+j)%SCENERY.length];
      const t=.32+rnd(seed+j*7)*.5;
      const y=pts[i].y+(pts[i+1].y-pts[i].y)*t;
      const side=rnd(seed+j*3)>.5?1:-1, off=46+rnd(seed+j*11)*44;
      const x=(pts[i].x+pts[i+1].x)/2+side*off;
      if(x<22||x>w-22) continue;
      const rot=wob(seed+j*5,11).toFixed(1);
      html+=`<div class="scene" style="left:${x.toFixed(0)}px;top:${y.toFixed(0)}px;transform:translate(-50%,-50%) rotate(${rot}deg)">${pictoSVG(s[0],s[2],s[1])}</div>`;
    }
  }

  LEVELS.forEach((l,i)=>{
    const locked=i>state.unlocked, cur=i===state.unlocked;
    const st=state.stars[i]||0, R=l.boss?46:37, S=(R+8)*2;
    const ink=inkOf(l,i);
    const hex=locked?'#CDC2A4':INK_HEX[ink];
    const disc=svgEl(S,S,
      `<path d="${scribbleCircle(S/2,S/2,R,i*7+3,3.6)}" fill="#2A3229" opacity="${locked?.1:.2}" transform="translate(3,4)"/>
       <path d="${scribbleCircle(S/2,S/2,R,i*7+37,3.4)}" fill="${hex}" stroke="${hex}" stroke-width="3" opacity="${locked?.5:1}" transform="translate(-.8,.7)"/>
       <path d="${scribbleCircle(S/2,S/2,R,i*7+91,3.1)}" fill="none" stroke="#2A3229" stroke-width="2" opacity="${locked?.35:.85}"/>
       ${cur?`<path d="${scribbleCircle(S/2,S/2,R+9,i*7+55,4.2)}" fill="none" stroke="#E03B26" stroke-width="2.6" stroke-dasharray="8 7" opacity=".95"/>`:''}`,
      `style="filter:url(#peint)"`);

    // glyphe : le numéro du niveau, sauf cadenas (verrouillé) et dé (Bazar)
    const glyph=locked?pictoSVG('cadenas',l.boss?42:34,'#6E6A5C')
              : l.boss?pictoSVG('des',42)
              : `<b class="lvl-num">${i+1}</b>`;
    html+=`<div class="node ${locked?'locked':''} ${l.boss?'boss':''} ${cur?'current':''}" style="left:${pts[i].x}px;top:${pts[i].y}px">
      <button class="disc" data-lvl="${i}" aria-label="Niveau ${i+1}${l.boss?' — grand bazar':''}${locked?' (verrouillé)':''}">
        ${disc}<span class="glyph">${glyph}</span>${(locked||l.boss)?`<span class="num">${i+1}</span>`:''}
        ${st>0?`<span class="flag">${pictoSVG('drapeau',22,INK_HEX[ink])}</span>`:''}
      </button>
      ${l.boss?`<div class="tag" style="transform:rotate(${(wob(i*13,1.3)).toFixed(2)}deg)"><i>Bazar !</i></div>`:''}
      <div class="stars">${starsRow(st,15,i*5)}</div>
    </div>`;
  });

  // annotations manuscrites, une toutes les 3 étapes, côté opposé au nœud
  LEVELS.forEach((l,i)=>{
    if(i%3!==1) return;
    const dd=DOODLES[(i/3|0)%DOODLES.length];
    const left=pts[i].x < w/2;
    html+=`<div class="doodle" style="left:${left?pts[i].x+64:pts[i].x-64-58}px;top:${pts[i].y-14}px;transform:rotate(${dd.r}deg)">${dd.t}</div>`;
  });

  map.innerHTML=html;
  requestAnimationFrame(()=>document.querySelectorAll('.node .tag').forEach((t,k)=>paintUI(t,HEX.papier,k*5+3,null,1.7)));
  $('starCount').innerHTML=pictoSVG('etoile',15)+'<span>'+Object.values(state.stars).reduce((a,b)=>a+b,0)+'</span>';
  requestAnimationFrame(()=>paintUI($('starCount'),HEX.jaune,3,HEX.ombre));
  map.querySelectorAll('.disc').forEach(b=>b.addEventListener('click',()=>{
    const i=+b.dataset.lvl; sfx.tap();
    if(i>state.unlocked){ b.animate([{transform:'rotate(0)'},{transform:'rotate(-5deg)'},{transform:'rotate(5deg)'},{transform:'rotate(0)'}],{duration:280}); return; }
    openSheet(i);
  }));
}
function scrollToCurrent(){
  const y=130+state.unlocked*STEP-mapScroll.clientHeight/2+40;
  mapScroll.scrollTo({top:Math.max(0,y),behavior:'smooth'});
}

/* ---------- quiz ---------- */
let run=null;
function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[b[i],b[j]]=[b[j],b[i]]}return b}
/* identifiant stable dérivé du texte : survit à toute réorganisation du fichier */
function qid(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;return (h>>>0).toString(36)}

/* Tirage : jamais vues d'abord, puis les moins vues.
   Les questions du dernier essai de CE niveau sont fortement pénalisées,
   pour ne pas retomber dessus quand on recommence après un échec.
   Chaque niveau voyage : au plus deux questions d'un même thème. */
function buildDeck(l){
  const pool=Object.entries(Q).flatMap(([k,v])=>v.map(q=>({...q,t:k})))
    .map(q=>({...q,id:qid(q.q)}));
  const dernier=new Set(state.last[l.id]||[]);
  const notes=pool.map(q=>({q,s:(state.seen[q.id]||0)*10+(dernier.has(q.id)?6:0)+Math.random()}));
  notes.sort((a,b)=>a.s-b.s);
  const parTheme={},choix=[];
  for(const o of notes){
    if(choix.length>=l.count) break;
    if((parTheme[o.q.t]||0)>=2) continue;
    parTheme[o.q.t]=(parTheme[o.q.t]||0)+1;
    choix.push(o.q);
  }
  state.last[l.id]=choix.map(q=>q.id);
  choix.forEach(q=>{state.seen[q.id]=(state.seen[q.id]||0)+1});
  save();
  return shuffle(choix).map(q=>{
    const mixed=shuffle(q.a.map((txt,i)=>({txt,i})));
    return {q:q.q,e:q.e,t:q.t,a:mixed.map(m=>m.txt),c:mixed.findIndex(m=>m.i===q.c)};
  });
}
function heartsHTML(n){
  return [0,1,2].map(k=>svgEl(24,24,
    (k<n?`<path d="${heartPath()}" fill="#E03B26" stroke="#E03B26" stroke-width="2.6" stroke-linejoin="round" transform="translate(-.5,.6)"/>`:'')
    +`<path d="${heartPath()}" fill="none" stroke="#2A3229" stroke-width="1.8" stroke-linejoin="round" opacity="${k<n?1:.32}"/>`,
    'width="20" height="20" style="filter:url(#peint)"')).join('');
}
function majJetons(){
  const c=$('coinCount');
  if(c){ c.innerHTML=pictoSVG('jeton',15)+'<span>'+state.jetons+'</span>';
         requestAnimationFrame(()=>paintUI(c,HEX.papier,11,HEX.ombre)); }
}
function majSon(){
  const b=$('soundBtn'); if(!b) return;
  b.innerHTML=pictoSVG(state.sound?'son':'sonCoupe',18);
  b.setAttribute('aria-label',state.sound?'Couper le son':'Activer le son');
  requestAnimationFrame(()=>paintUI(b,HEX.papier,20,HEX.ombre));
}
function renderBoosts(){
  const box=$('boosts'); if(!box||!run) return;
  const dispo=BOOSTS.filter(b=>!b.boss||run.boss);
  box.innerHTML=dispo.map((b,i)=>{
    const S=52,R=20,d1=scribbleCircle(S/2,S/2,R,i*13+run.lvl*7+5,3.1),d2=scribbleCircle(S/2,S/2,R,i*13+77,2.7),
          d3=scribbleCircle(S/2,S/2,R,i*13+51,2.9);
    return `<button class="boost" data-b="${b.k}" title="${b.n} — ${b.d}" aria-label="${b.n}, ${b.p} jetons : ${b.d}">
      ${svgEl(S,S,`<path d="${d1}" fill="#2A3229" opacity=".2" transform="translate(2,3)"/>
        <path d="${d3}" fill="#F2C64B" stroke="#F2C64B" stroke-width="2.8" transform="translate(-.7,.6)"/>
        <path d="${d2}" fill="none" stroke="#2A3229" stroke-width="2" opacity=".85"/>`,'style="filter:url(#peint)"')}
      <span class="g">${pictoSVG(b.ico,22)}</span><span class="p">${b.p}</span></button>`;
  }).join('');
  box.querySelectorAll('.boost').forEach(el=>el.addEventListener('click',()=>utiliserBoost(el.dataset.b)));
  majBoosts();
}
function majBoosts(){
  requestAnimationFrame(peindreUI);
  document.querySelectorAll('#boosts .boost').forEach(el=>{
    const b=BOOSTS.find(x=>x.k===el.dataset.b);
    const utilise=run.usedTour, repondu=run.repondu;
    const pauvre=state.jetons<b.p;
    el.classList.toggle('off', pauvre||repondu);
    el.classList.toggle('used', !!utilise);
    el.disabled = pauvre||repondu||!!utilise;
  });
}
function utiliserBoost(k){
  const b=BOOSTS.find(x=>x.k===k);
  if(!b||!run||run.repondu||run.usedTour||state.jetons<b.p) return;
  state.jetons-=b.p; run.usedTour=true; run.aideUtilisee=true;
  sfx.tap(); majJetons(); majBoosts(); save();
  const c=run.deck[run.idx];
  const mauvaises=[...document.querySelectorAll('#boosts')].length?[...document.querySelectorAll('.ans')].filter(el=>+el.dataset.i!==c.c&&!el.classList.contains('gone')):[];
  const effacer=n=>shuffle(mauvaises).slice(0,n).forEach(el=>{
    el.classList.add('gone','dim'); el.disabled=true;
    el.style.textDecoration='line-through'; el.style.opacity='.3';
  });
  if(k==='ciseaux') effacer(2);
  if(k==='blanco')  effacer(1);
  if(k==='calque'){ run.bouclier=true; flashInfo('Calque posé'); }
  if(k==='double'){ run.x2=true; flashInfo('Points doublés'); }
  if(k==='sablier'&&run.boss){ startTimer(); flashInfo('Chrono relancé'); }
  if(k==='page'){
    clearInterval(run.timerId);
    run.res[run.idx]='skip';
    if(run.idx===run.deck.length-1) return finish(run.lives>0);
    run.idx++; $('combo').classList.remove('on'); renderQuestion();
  }
}
function flashInfo(t){
  const el=$('combo'); el.textContent=t; el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),1400);
}
/* La signature : un énorme « NO WAY! » tamponné sur la carte quand
   l'anecdote se révèle. Rouge si l'on a vu juste, jaune sinon. */
function stampNoWay(ok){
  const s=$('stamp'); if(!s) return;
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  s.classList.toggle('ko',!ok);
  s.classList.remove('on'); void s.offsetWidth;   // redémarre l'animation
  s.classList.add('on');
  const card=$('qCard'); if(card){ card.classList.remove('thump'); void card.offsetWidth; card.classList.add('thump'); }
  try{ if(navigator.vibrate) navigator.vibrate(ok?18:[10,40,10]); }catch(e){}
}

function startLevel(i){
  const l=LEVELS[i];
  run={lvl:i,deck:buildDeck(l),idx:0,lives:3,wrong:0,points:0,combo:0,boss:l.boss,timerId:null,res:{},
       usedTour:false,repondu:false,aideUtilisee:false,bouclier:false,x2:false};
  renderBoosts();
  closeSheet();
  $('quizScreen').classList.add('on');
  $('timer').classList.toggle('on',!!l.boss);
  requestAnimationFrame(peindreUI);
  renderQuestion();
}
function renderQuestion(){
  const c=run.deck[run.idx];
  run.usedTour=false; run.repondu=false;
  // pastille de thème : logo + encre du thème, question par question
  const th=THEMES[c.t], clair=INK_CLAIR.has(th.ink), enc=clair?'#2A3229':'#FAF2DC';
  const tag=$('qTag');
  tag.style.background=INK_HEX[th.ink];
  tag.style.color=enc;
  tag.innerHTML=pictoSVG(th.ico,15,enc)+`<span>${th.name}</span>`;
  $('qText').textContent=c.q;
  $('segs').innerHTML=run.deck.map((_,i)=>{
    const r=run.res[i];
    return `<b class="${i<run.idx?(r==='skip'?'skip':(r?'ok':'ko')):(i===run.idx?'now':'')}"></b>`;
  }).join('');
  $('hearts').innerHTML=heartsHTML(run.lives);
  const seed0=run.idx*37+run.lvl*101;
  $('answers').innerHTML=c.a.map((txt,i)=>{
    const sgn=i%2?1:-1;
    const rot=(sgn*(.35+rnd(seed0+i*5)*.5)).toFixed(2);           // sens alterné, très léger
    const dx=(wob(seed0+i*9+3,2.2)).toFixed(1);                   // bords à peine décalés
    const wd=(96+rnd(seed0+i*13)*3.5).toFixed(1);                 // largeurs presque égales
    const al=i%2?'flex-end':'flex-start';
    return `<button class="ans" data-i="${i}" style="transform:rotate(${rot}deg) translateX(${dx}px);width:${wd}%;align-self:${al}">
      <span class="key"><i>${'ABCD'[i]}</i></span><span class="lbl">${txt}</span></button>`;
  }).join('');
  $('answers').querySelectorAll('.ans').forEach((b,i)=>{
    paintFrame(b,HEX.papier,HEX.ombre,seed0+i*23);
    b.addEventListener('click',()=>answer(+b.dataset.i));
  });
  paintFrame($('qCard'),HEX.jaune,HEX.ombre,seed0+7,1.5);
  paintWave($('explain'),seed0);
  $('explain').classList.remove('on');
  majBoosts();
  requestAnimationFrame(peindreUI);
  if(run.boss) startTimer();
}
function startTimer(){
  clearInterval(run.timerId);
  const bar=$('timerBar'), total=12000, t0=performance.now();
  bar.style.width='100%';
  run.timerId=setInterval(()=>{
    const p=1-(performance.now()-t0)/total;
    if(p<=0){clearInterval(run.timerId);answer(-1);return}
    bar.style.width=(p*100)+'%';
  },50);
}
function answer(i){
  clearInterval(run.timerId);
  const c=run.deck[run.idx], ok=i===c.c;
  run.res[run.idx]=ok; run.repondu=true; majBoosts();
  const seed0=run.idx*37+run.lvl*101;
  $('answers').querySelectorAll('.ans').forEach((b,k)=>{
    b.disabled=true;
    if(k===c.c){ b.classList.add('good'); paintFrame(b,HEX.vert,HEX.ombre,seed0+k*23); }
    else if(k===i){ b.classList.add('bad'); paintFrame(b,HEX.rouge,HEX.ombre,seed0+k*23); }
    else b.classList.add('dim');
  });
  if(ok){
    run.combo++;
    const m=Math.min(3,1+Math.floor(run.combo/2))*(run.x2?2:1);
    run.points+=10*m; run.x2=false;
    if(m>1){$('combo').textContent='×'+m;$('combo').classList.add('on')}
    sfx.good();
    $('verdict').textContent=run.combo>=3?'En série !':'Bien vu';
    $('verdict').className='verdict ok';
  }else{
    run.combo=0; run.wrong++; run.x2=false;
    if(run.bouclier){ run.bouclier=false; $('verdict').textContent='Rattrapé au calque'; }
    else { run.lives--; $('verdict').textContent=i===-1?'Temps écoulé':'Raté'; }
    $('combo').classList.remove('on');
    sfx.bad();
    $('verdict').className='verdict ko';
    $('hearts').innerHTML=heartsHTML(run.lives);
  }
  $('explainText').textContent=c.e;
  requestAnimationFrame(peindreUI);
  $('nextBtn').querySelector('.lbl').textContent=(run.lives===0||run.idx===run.deck.length-1)?'Voir le résultat':'Continuer';
  paintFrame($('nextBtn'),HEX.rouge,HEX.ombre,seed0+41);
  setTimeout(()=>{ stampNoWay(ok); $('explain').classList.add('on'); },300);
}
$('nextBtn').addEventListener('click',()=>{
  sfx.tap();
  if(run.lives===0) return finish(false);
  if(run.idx===run.deck.length-1) return finish(true);
  run.idx++; $('combo').classList.remove('on'); renderQuestion();
});
$('quitBtn').addEventListener('click',()=>{
  clearInterval(run&&run.timerId);
  $('quizScreen').classList.remove('on');
  $('explain').classList.remove('on');
});

/* ---------- résultat ---------- */
function finish(won){
  let stars=won?Math.max(1,3-run.wrong):0;
  if(run.aideUtilisee) stars=Math.min(stars,2);   // on n'achète pas les trois étoiles
  const premier=won&&!state.stars[run.lvl];
  const gain=won?(stars+(stars===3?2:0)+(premier?3:0)+(run.boss?5:0)):0;
  $('quizScreen').classList.remove('on');
  $('explain').classList.remove('on');
  $('resultScreen').classList.add('on');
  $('resultTitle').textContent=won?(stars===3?'Sans faute':'Niveau terminé'):'Plus de vies';
  $('resultScore').innerHTML=`${run.points}<small>points</small>`;
  $('bigStars').innerHTML=[0,1,2].map(k=>{
    const on=k<stars;
    return svgEl(58,58,
      (on?`<path d="${starPath(29,29,26,k*9+run.lvl+23)}" fill="#F2C64B" stroke="#F2C64B" stroke-width="4" stroke-linejoin="round" transform="translate(-1,1.4)"/>`:'')
      +`<path d="${starPath(29,29,26,k*9+run.lvl)}" fill="none" stroke="#2A3229" stroke-width="2.2" stroke-linejoin="round" opacity="${on?1:.3}"/>`,
      `class="${on?'pop':'flat'}" style="animation-delay:${k*.14}s;filter:url(#peint)" width="58" height="58"`);
  }).join('');
  $('continueBtn').querySelector('.lbl').textContent=won?'Continuer':'Retour à la carte';
  $('retryBtn').style.display=(won&&stars===3)?'none':'block';
  paintFrame($('continueBtn'),HEX.rouge,HEX.ombre,run.lvl*13+3);
  paintFrame($('retryBtn'),HEX.jaune,HEX.ombre,run.lvl*13+61);
  const rc=$('resultCoins'); rc.classList.remove('on');
  rc.innerHTML=gain?`${pictoSVG('jeton',23,'#F2C64B')}<span>+${gain} jeton${gain>1?'s':''} gagné${gain>1?'s':''} !</span>`:'';
  if(won){
    sfx.win(); confetti();
    if(stars>(state.stars[run.lvl]||0)) state.stars[run.lvl]=stars;
    if(run.lvl===state.unlocked&&state.unlocked<LEVELS.length-1) state.unlocked++;
    save();
    // la récompense arrive après les étoiles : jetons versés + animation + son
    if(gain) setTimeout(()=>{
      rc.classList.add('on');
      state.jetons+=gain; majJetons(); save();
      [740,990,1240].forEach((f,i)=>setTimeout(()=>beep(f,.12,'triangle',.05),i*70));
    },560);
  }else sfx.lose();
}
function confetti(){
  const box=$('confetti'); box.innerHTML='';
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  // couleurs de la palette carnet (mêmes encres que le reste du jeu)
  const cols=['#E03B26','#F2C64B','#79A257','#E8897A','#2C6E7F','#4FA8A0','#E6A93C','#B5533C'];
  for(let i=0;i<32;i++){
    const el=document.createElement('i');
    el.style.left=Math.random()*100+'%';
    el.style.setProperty('--c',cols[i%cols.length]);
    el.style.animationDuration=(1.5+Math.random()*1.5)+'s';
    el.style.animationDelay=(Math.random()*.5)+'s';
    box.appendChild(el);
  }
}
$('continueBtn').addEventListener('click',()=>{sfx.tap();$('resultScreen').classList.remove('on');renderMap();scrollToCurrent()});
$('retryBtn').addEventListener('click',()=>{sfx.tap();$('resultScreen').classList.remove('on');startLevel(run.lvl)});
$('playBtn').addEventListener('click',()=>{sfx.tap();startLevel(picked)});
$('soundBtn').addEventListener('click',()=>{ state.sound=!state.sound; majSon(); save(); });
document.addEventListener('keydown',e=>{
  if(!$('quizScreen').classList.contains('on')) return;
  const k=e.key.toUpperCase();
  if('ABCD'.includes(k)){
    const b=$('answers').querySelector(`.ans[data-i="${'ABCD'.indexOf(k)}"]`);
    if(b&&!b.disabled) b.click();
  }
  if(e.key==='Enter'&&$('explain').classList.contains('on')) $('nextBtn').click();
});


if(document.fonts && document.fonts.ready){
  document.fonts.ready.then(()=>setTimeout(repaintFrames,60));
}

(async function(){
  await load();
  majSon();
  majJetons();
  $('quitBtn').innerHTML=pictoSVG('croix',15);
  requestAnimationFrame(peindreUI);
  renderMap();
  setTimeout(scrollToCurrent,120);
  let rid; window.addEventListener('resize',()=>{clearTimeout(rid);rid=setTimeout(()=>{
    renderMap();
    if(run && $('quizScreen').classList.contains('on')) renderQuestion();
  },150)});
})();
</script>
